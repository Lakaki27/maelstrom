# traefik/conf.d/native-services.yml
#
# Routers for services running natively on the host (not in Docker).
# Traefik reaches them via host.docker.internal (= 127.0.0.1 on the host).
#
# Add a new block here whenever you add a new native NixOS service.

http:
    routers:
        paperless:
            rule: "Host(`paperless.home`)"
            entryPoints: [websecure]
            tls: {}
            service: paperless

        vaultwarden:
            rule: "Host(`vaultwarden.home`)"
            entryPoints: [websecure]
            tls: {}
            service: vaultwarden

        gitea:
            rule: "Host(`gitea.home`)"
            entryPoints: [websecure]
            tls: {}
            service: gitea

        gatus:
            rule: "Host(`gatus.home`)"
            entryPoints: [websecure]
            tls: {}
            service: gatus

        homepage:
            rule: "Host(`home.home`)"
            entryPoints: [websecure]
            tls: {}
            service: homepage

    services:
        paperless:
            loadBalancer:
                servers:
                    - url: "http://host.docker.internal:28981" # default paperless port

        vaultwarden:
            loadBalancer:
                servers:
                    - url: "http://host.docker.internal:8222" # ROCKET_PORT in configuration.nix

        gitea:
            loadBalancer:
                servers:
                    - url: "http://host.docker.internal:3001" # HTTP_PORT in configuration.nix

        gatus:
            loadBalancer:
                servers:
                    - url: "http://host.docker.internal:8090" # web.port in configuration.nix

        homepage:
            loadBalancer:
                servers:
                    - url: "http://host.docker.internal:8082" # listenPort in configuration.nix
