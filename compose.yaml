# compose.yaml — Docker-only services
#
# The following are managed natively by NixOS (configuration.nix):
#   PostgreSQL, Redis, Paperless, Vaultwarden, Gitea, Gatus, Deluge
#
# This file only runs services that have no NixOS module:
#   Traefik, Chiyogami, ConvertX, Send, Seafile
#
# Native services are proxied by Traefik via host network (127.0.0.1:PORT).

services:

    # ──────────────────────────────────────────
    # Traefik — reverse proxy for everything
    # Routes to both Docker services and native NixOS services
    # ──────────────────────────────────────────
    traefik:
        image: traefik:v3.2
        container_name: traefik
        restart: unless-stopped
        command:
            - --api.dashboard=true
            - --api.insecure=true
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --providers.file.filename=/certs/tls.yml
            # The file provider also picks up the native-services router config
            - --providers.file.directory=/etc/traefik/conf.d
            - --providers.file.watch=true
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.web.http.redirections.entrypoint.to=websecure
            - --entrypoints.web.http.redirections.entrypoint.scheme=https
            - --log.level=INFO
            - --accesslog=true
        ports:
            - "80:80"
            - "443:443"
            - "8080:8080"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./traefik/certs:/certs:ro
            - ./traefik/conf.d:/etc/traefik/conf.d:ro
        # host network access lets Traefik reach 127.0.0.1:PORT for native services
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - proxy
        labels:
            - traefik.enable=true
            - traefik.http.routers.traefik.rule=Host(`traefik.home`)
            - traefik.http.routers.traefik.entrypoints=websecure
            - traefik.http.routers.traefik.tls=true
            - traefik.http.routers.traefik.service=api@internal

    # ──────────────────────────────────────────
    # Chiyogami — pastebin
    # ──────────────────────────────────────────
    chiyogami:
        container_name: chiyogami
        image: ghcr.io/rhee876527/chiyogami
        restart: unless-stopped
        cap_drop:
            - ALL
        cap_add:
            - SETGID
            - SETUID
            - CHOWN
        security_opt:
            - no-new-privileges
        volumes:
            - ./pastes:/pastes
        environment:
            - SECRET_KEY=${CHIYOGAMI_SECRET_KEY}
        networks:
            - proxy
        labels:
            - traefik.enable=true
            - traefik.http.routers.chiyogami.rule=Host(`chiyogami.home`)
            - traefik.http.routers.chiyogami.entrypoints=websecure
            - traefik.http.routers.chiyogami.tls=true
            - traefik.http.services.chiyogami.loadbalancer.server.port=8000

    # ──────────────────────────────────────────
    # ConvertX — file format converter
    # ──────────────────────────────────────────
    convertx:
        image: ghcr.io/c4illin/convertx
        container_name: convertx
        restart: unless-stopped
        environment:
            - JWT_SECRET=${CONVERTX_JWT_SECRET}
            - ALLOW_UNAUTHENTICATED=false
        volumes:
            - convertx-data:/app/data
        networks:
            - proxy
        labels:
            - traefik.enable=true
            - traefik.http.routers.convertx.rule=Host(`convertx.home`)
            - traefik.http.routers.convertx.entrypoints=websecure
            - traefik.http.routers.convertx.tls=true
            - traefik.http.services.convertx.loadbalancer.server.port=3000

    # ──────────────────────────────────────────
    # Send — ephemeral encrypted file sharing
    # Uses the native Redis instance on the host
    # ──────────────────────────────────────────
    send:
        image: "${DOCKER_SEND_IMAGE}"
        container_name: send
        restart: unless-stopped
        volumes:
            - ./send/uploads:/uploads
        environment:
            - NODE_ENV=production
            - BASE_URL=${SEND_BASE_URL}
            - PORT=1234
            - REDIS_HOST=host.docker.internal   # native Redis on 127.0.0.1
            - REDIS_PORT=6379
            - FILE_DIR=/uploads
            - MAX_FILE_SIZE=2147483648
            - MAX_DOWNLOADS=20
            - EXPIRE_TIMES_SECONDS=86400,604800,2592000
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - proxy
        labels:
            - traefik.enable=true
            - traefik.http.routers.send.rule=Host(`send.home`)
            - traefik.http.routers.send.entrypoints=websecure
            - traefik.http.routers.send.tls=true
            - traefik.http.services.send.loadbalancer.server.port=1234

    # ──────────────────────────────────────────
    # Seafile — file storage & sharing (Google Drive-style)
    # Uses the native PostgreSQL instance on the host (three databases)
    # Files stored on ZFS at /mnt/nas/seafile
    # ──────────────────────────────────────────
    seafile-memcached:
        image: memcached:1.6-alpine
        container_name: seafile-memcached
        restart: unless-stopped
        entrypoint: memcached -m 256
        networks:
            - seafile-internal

    seafile:
        image: seafileltd/seafile-mc:11.0-latest
        container_name: seafile
        restart: unless-stopped
        depends_on:
            - seafile-memcached
        volumes:
            - /mnt/nas/seafile:/shared   # all user data lands on ZFS
        environment:
            - DB_HOST=host.docker.internal
            - DB_PORT=5432
            - DB_USER=seafile
            - DB_ROOT_PASSWD=${SEAFILE_DB_PASSWORD}
            - SEAFILE_ADMIN_EMAIL=${SEAFILE_ADMIN_EMAIL}
            - SEAFILE_ADMIN_PASSWORD=${SEAFILE_ADMIN_PASSWORD}
            - SEAFILE_SERVER_LETSENCRYPT=false  # TLS handled by Traefik
            - SEAFILE_SERVER_HOSTNAME=seafile.home
            - TIME_ZONE=${TZ:-Europe/Paris}
            - MEMCACHE_HOST=seafile-memcached
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - proxy
            - seafile-internal
        labels:
            - traefik.enable=true
            - traefik.http.routers.seafile.rule=Host(`seafile.home`)
            - traefik.http.routers.seafile.entrypoints=websecure
            - traefik.http.routers.seafile.tls=true
            - traefik.http.services.seafile.loadbalancer.server.port=80

networks:
    proxy:
        external: false
    seafile-internal:
        internal: true

volumes:
    convertx-data:
